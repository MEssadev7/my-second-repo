<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Company Banner</title>

    <style>
      body {
        background-color: rgba(135, 47, 47, 0.1);
      }

      .banner {
        position: relative;
        width: 1305px;
        height: 600px;
      }

      .banner img {
        width: 100%;
        height: 100%;
      }

      .text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);

        color: white;
        font-size: 40px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="banner">
      <img src="image.jpg.jpg" alt="Microsoft Logo" />

      <div class="text">
        <h1 style="color: yellow; font-size: 25px">Welcome To Our Website</h1>
        <p style="color: rgb(206, 9, 9); font-size: 25px">
          We provide software solutions for businesses.
        </p>
        <p style="color: rgb(224, 203, 12); font-size: 25px">
          we created usefull app website aplication or many other thing .
        </p>
      </div>
    </div>
  </body>
</html>
