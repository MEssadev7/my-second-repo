<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dream Destination</title>
    <style>
      body {
        /* Center the card */
        display: flex;
        justify-content: center;
        align-items: center;

        height: 100vh;

        background-color: #222;

        font-family: Arial, sans-serif;
      }

      .card {
        /* Card size: */
        width: 400px;
        height: 500px;

        /*Space inside card: */
        padding: 30px;

        background-color: gray;

        /* Background image: */
        background-image: url("https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e");
        /* Important: */
        background-size: cover;
        /*Makes image fill the card.  */
        background-position: center;

        color: white;

        text-align: center;
        /* Button CSS */
        button {
          background-color: #c6169a;

          color: white;

          border: none;

          padding: 15px 30px;

          font-size: 18px;

          cursor: pointer;
        }
      }
    </style>
  </head>

  <body>
    <!-- Main div class -->
    <div class="card">
      <!-- Destination name: -->
      <h2>Tokyo Japan</h2>

      <!-- Adds information about the -->
      <p>
        Discover the beauty of ancient temples, peaceful gardens, and amazing
        Japanese culture.
      </p>

      <!-- Creates clickable button. -->
      <button>Explor:</button>
    </div>
  </body>
</html>
