<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .logon {
        margin: 0;
        background: #000;
        color: #0ff;
        display: grid;
        height: 100vh;
        font-family: monospace;
        place-items: center;
      }
    </style>
  </head>
  <body>
    <div
      class="login"
      style="border: 1px solid #0ff; padding: 20px; box-shadow: 0 0 20px #0ff"
    >
      <input
        placeholder="Username"
        style="background: #111; color: #0ff; border: 0; margin: 5px"
      /><br /><br />
      <input
        placeholder="Pass"
        type="password"
        style="background: #111; color: #0ff; border: 0; margin: 5px"
      /><br /><br />
      <button
        onclick="alert('Acses Granted!')"
        style="background: #0ff; border: 0; padding: 5px"
      >
        Login
      </button>
    </div>
  </body>
</html>
