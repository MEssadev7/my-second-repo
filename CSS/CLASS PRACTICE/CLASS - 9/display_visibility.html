<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display and Visibility</title>
    <style>
      .box {
        width: 200px;
        height: 200px;
        background-color: lightblue;
        margin: 20px;
      }

      .hidden {
        display: none;
      }

      .invisible {
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <div class="box">This is a visible box.</div>
    <div class="box hidden">This is a hidden box.</div>
    <div class="box invisible">This is an invisible box.</div>
  </body>
</html>
