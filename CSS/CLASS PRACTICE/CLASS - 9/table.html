<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>table</title>
    <style>
      table {
        border: 1px solid #ccc;
        border-collapse: collapse;
      }

      tr,
      th {
        text-align: center;
      }
      th {
        color: aqua;
        background-color: blueviolet;
      }
      /* th table height or table data ko length or width dia ha   */
      th,
      td {
        border: 1px solid #ccc;
        padding: 5px;
        height: 30px;
        border-bottom: 1px solid #ccc;
      }
      /* chid ko even or odd de sakete ha  */
      tr:nth-child(even) {
        background-color: rgb(43, 226, 86);
        color: aquamarine;
      }
      /* jab mouse gomoma wo to to ap ko kuch feel hoga */
      td:hover {
        color: rgb(204, 204, 4);
        background-color: rgb(95, 146, 135);
      }
      /* botton ka hisa ha  */
      button {
        border-radius: 5px;
      }
      /* button ko hover par */
      button:hover {
        color: red;
        background-color: lightgray;
      }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <th>Name</th>
        <th>age</th>
        <th>roll No</th>
        <th>Class</th>
        <th>section</th>
        <th>Action</th>
      </tr>
      <tr>
        <td>M.Essa</td>
        <td>18</td>
        <td>1</td>
        <td>11th</td>
        <td>A</td>
        <td>
          <button>work done</button>
          <button>work not done</button>
        </td>
      </tr>
      <tr>
        <td>Hassan</td>
        <td>18</td>
        <td>2</td>
        <td>11th</td>
        <td>B</td>
        <td>
          <button>work done</button>
          <button>work not done</button>
        </td>
      </tr>
      <tr>
        <td>Mudeer khan</td>
        <td>18</td>
        <td>3</td>
        <td>11th</td>
        <td>C</td>
        <td>
          <button>work not done</button>
          <button>work done</button>
        </td>
      </tr>
      <tr>
        <td>fahad afridi</td>
        <td>18</td>
        <td>4</td>
        <td>11th</td>
        <td>d</td>
        <td>
          <button>work not done</button>
          <button>work done</button>
        </td>
      </tr>
    </table>
  </body>
</html>
