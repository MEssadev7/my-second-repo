<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Font Family</title>
    <!-- link dowload from (search font family then click on poppins and click on got it ) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Yuyu+Short&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montenegrin+Gothic+One&display=swap"
      rel="stylesheet"
    />
    <style>
      .para {
        font-family: "Yuyu Short", sans-serif;
        font-size: 16px;
        color: rgb(206, 40, 117);
      }
      .second {
        font-family: "Bebas Neue", sans-serif;
        font-size: 16px;
        color: aquamarine;
      }
      .third {
        font-family: "Montenegrin Gothic One", serif;
        font-size: 16px;
        color: saddlebrown;
      }
    </style>
  </head>
  <body>
    <p class="para">
      Lorem ipsum dolor sit, amet consectetur adipisicing elit. Voluptate,
      suscipit.
    </p>
    <p class="second">my name is muhammad essa .my father name is safder.</p>
    <p class="third">i belong to dara adam khel</p>
  </body>
</html>
