<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> HTML FORM</title>
</head>

<body>
    <FORm action="">
        <LAbel for="">USERNAME :</LAbel><br>
        <INput type="TEXT"></INput><br>


        <label for="">email :</label><br>
        <input type="email"></input><br>


        <label for="">password :</label><br>
        <input type="password" minlength="2" maxlength="8" required></input><br>


        <label for="">gender :</label><br>
        <input type="radio">male
        <input type="radio">female <br>


        <label for="">languages:</label><br>
        <input type="checkbox">english
        <input type="checkbox">urdu
        <input type="checkbox">pushto <br>


        <input type="button" value="test"> <br>
        <input type="button" value="reset"> <br>

        <label for="">contries :</label><br>
        <select name="" id="">
            <option value="pak">pakistan</option>
            <option value="ind">india</option>
            <option value="dub">dubai</option>
            <option value="uk">uk</option>
            <option value="us ">us</option>
        </select>
        <br>


        <select name="country/city" id="">
            <optgroup label="pakistan">
                <option value="pesh">peshawar</option>
                <option value="mar">mardan</option>
                <option value="isl">islamabad</option>
            </optgroup>
        </select>
        <br>
        <select name="car" id="">
            <optgroup label="favourite car ">
                <option value="volvo">volvo</option>
                <option value="audi">audi</option>
                <option value="mercedes">mercedes</option>
            </optgroup>
        </select>
        <br>
        <input type="date"><br>
        <input type="datetime-local"><br>
        <input type="color"><br>
        <input type="month"><br>
        <input type="submit"><br>
    </FORm>
</body>

</html>
