<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
</head>
<body>

    <h1>Job Application Form</h1>

    <form>

        <!-- Personal Information -->
        <fieldset>
            <legend>Personal Information</legend>

            <label for="fullname">Full Name:</label><br>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
            <br><br>

            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
            <br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="text" id="phone" name="phone" placeholder="Enter phone number" required>
            <br><br>

            <label for="website">Website or Portfolio:</label><br>
            <input type="url" id="website" name="website" placeholder="https://yourwebsite.com">
            <br><br>

            <label for="dob">Date of Birth:</label><br>
            <input type="date" id="dob" name="dob" required>
            <br><br>
        </fieldset>

        <br>

        <!-- Job Details -->
        <fieldset>
            <legend>Job Details</legend>

            <label for="position">Job Position:</label><br>
            <select id="position" name="position" required>
                <option value="">Select Position</option>
                <option value="frontend">Frontend Developer</option>
                <option value="backend">Backend Developer</option>
                <option value="uiux">UI/UX Designer</option>
                <option value="qa">QA Engineer</option>
            </select>

            <br><br>

            <label>Preferred Work Location:</label><br>

            <input type="radio" id="onsite" name="location" value="On-site" required>
            <label for="onsite">On-site</label>

            <input type="radio" id="remote" name="location" value="Remote">
            <label for="remote">Remote</label>

            <input type="radio" id="hybrid" name="location" value="Hybrid">
            <label for="hybrid">Hybrid</label>

            <br><br>

            <label>Skills:</label><br>

            <input type="checkbox" id="html" name="skills" value="HTML">
            <label for="html">HTML</label>

            <input type="checkbox" id="css" name="skills" value="CSS">
            <label for="css">CSS</label>

            <input type="checkbox" id="javascript" name="skills" value="JavaScript">
            <label for="javascript">JavaScript</label>

            <input type="checkbox" id="react" name="skills" value="React">
            <label for="react">React</label>

            <input type="checkbox" id="node" name="skills" value="Node.js">
            <label for="node">Node.js</label>

            <br><br>

            <label for="resume">Resume Upload:</label><br>
            <input type="file" id="resume" name="resume" required>

            <br><br>

            <label for="about">Write About Yourself:</label><br>
            <textarea id="about" name="about" rows="5" cols="40" placeholder="Write something about yourself..." required></textarea>

            <br><br>
        </fieldset>

        <br>

        <!-- Extra Section -->
        <fieldset>
            <legend>Extra Section</legend>

            <label for="search">Search your favorite tech stack:</label><br>
            <input type="search" id="search" name="search" placeholder="Search here...">

            <br><br>

            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password" placeholder="Enter password" required>

            <br><br>

            <label for="confirm-password">Confirm Password:</label><br>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm password" required>

            <br><br>

            <!-- Submit Button -->
            <input type="submit" value="Submit Application">

        </fieldset>

    </form>

</body>
</html>
