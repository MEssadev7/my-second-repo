<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
  </head>
  <body>
    <fieldset>
      <legend>inquary form</legend>
      <form method="" action="">
        <label for="name">Name:</label><br />
        <input
          type="text"
          pattern="[a-zA-Z]{1,40}"
          title="inter alphabet between 3 and 40"
          placeholder="inter the name "
          id="name"
          name="uname"
        />
        <br />
        <label for="Email">Email:</label><br />
        <input
          type="text"
          placeholder="inter the Email"
          id="Email"
          pattern="[]"
          name="uEmail"
        /><br />
        <label for="Phone">Phone:</label>
        <br />
        <input
          type="tel"
          pattern="[0-9]{10}"
          placeholder="inter the phone number"
          title="inter the phone number with 10 digit"
        />
        <br />
        <label for="Message">Message:</label><br />
        <textarea
          name="message"
          id="Message"
          cols="30"
          rows="10"
          placeholder="inter the message"
        ></textarea
        ><br />
        <button type="submit">save</button>
      </form>
    </fieldset>
  </body>
</html>
