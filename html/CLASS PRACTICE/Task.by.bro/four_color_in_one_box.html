<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Four Type Color Box</title>
    <style>
      .main {
        width: 400px;
        height: 400px;
        background-color: rgb(16, 170, 181);
      }
      .row1 {
        display: flex;
      }
      .row1c1 {
        width: 200px;
        height: 200px;
        float: left;
        background-color: rgb(228, 215, 19);
      }
      .row1c2 {
        width: 200px;
        height: 200px;
        float: right;
        background-color: rgb(198, 24, 151);
      }
      .row2 {
        display: flex;
      }
      .row2c1 {
        width: 200px;
        height: 200px;
        float: left;
        background-color: rgb(255, 0, 0);
      }
      .row2c2 {
        width: 200px;
        height: 200px;
        float: right;
        background-color: rgb(0, 255, 0);
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="row1">
        <div class="row1c1" align="center">About</div>
        <div class="row1c2" align="center">Class</div>
      </div>
      <div class="row2">
        <div class="row2c1" align="center">About</div>
        <div class="row2c2" align="center">Class</div>
      </div>
    </div>
  </body>
</html>
